<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다 | 동수원노인전문요양원</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1C3020;
      --gold: #B8935A;
      --gold-light: #d4aa77;
      --cream: #F5F0E8;
      --text: #2c2c2c;
      --text-muted: #666;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--cream); color: var(--text); }

    .top-strip {
      background: var(--forest); padding: 10px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .strip-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .emblem {
      width: 34px; height: 34px; background: var(--gold); color: var(--forest);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-family: 'Gowun Batang', serif; font-size: 17px; font-weight: 700;
    }
    .strip-name { color: #fff; font-size: 13px; font-family: 'Gowun Batang', serif; }
    .strip-tel { color: var(--gold-light); font-size: 13px; text-decoration: none; font-weight: 500; }
    .strip-tel:hover { color: #fff; }

    .error-wrap {
      min-height: calc(100vh - 54px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px 24px 80px; text-align: center;
    }

    .deco-ring { position: relative; width: 170px; height: 170px; margin: 0 auto 52px; }
    .deco-ring::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid var(--gold); opacity: 0.3;
      animation: ringpulse 3s ease-in-out infinite;
    }
    .deco-ring::after {
      content: ''; position: absolute; inset: 14px; border-radius: 50%;
      border: 1px solid var(--gold); opacity: 0.18;
      animation: ringpulse 3s ease-in-out infinite 0.6s;
    }
    @keyframes ringpulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.07); opacity: 0.12; }
    }
    .ring-inner {
      position: absolute; inset: 26px; background: var(--forest);
      border-radius: 50%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .num-404 { font-family: 'Playfair Display', serif; font-size: 48px; color: var(--gold); line-height: 1; }
    .num-label { font-size: 9px; color: rgba(255,255,255,0.45); letter-spacing: 0.1em; margin-top: 2px; }

    .error-title {
      font-family: 'Gowun Batang', serif; font-size: clamp(20px, 4vw, 26px);
      color: var(--forest); font-weight: 700; margin-bottom: 14px; line-height: 1.5;
    }
    .error-desc { font-size: 15px; color: var(--text-muted); line-height: 1.9; margin-bottom: 40px; max-width: 420px; }

    .btn-group { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-bottom: 52px; }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--forest); color: #fff; padding: 13px 28px; border-radius: 4px;
      font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.2s;
    }
    .btn-home:hover { background: #2a4630; }
    .btn-tel {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--forest);
      border: 1.5px solid var(--gold); padding: 13px 28px; border-radius: 4px;
      font-size: 14px; font-weight: 600; text-decoration: none; transition: background 0.2s, color 0.2s;
    }
    .btn-tel:hover { background: var(--gold); color: #fff; }

    .divider { width: 40px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 44px; }

    .quick-section { width: 100%; max-width: 540px; }
    .quick-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 16px; font-weight: 600; }
    .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .quick-link {
      background: #fff; border: 1px solid rgba(28,48,32,0.12); border-radius: 6px;
      padding: 16px 10px; text-decoration: none; color: var(--forest);
      font-size: 13px; font-weight: 500;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 7px;
    }
    .quick-link:hover { border-color: var(--gold); box-shadow: 0 2px 12px rgba(184,147,90,0.15); }
    .quick-icon { font-size: 20px; }

    .footer-note { margin-top: 52px; font-size: 12px; color: rgba(28,48,32,0.3); }

    @media (max-width: 480px) {
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
      .num-404 { font-size: 40px; }
      .deco-ring { width: 148px; height: 148px; }
    }
  </style>
</head>
<body>

<div class="top-strip">

      </svg>
      홈으로 돌아가기
    </a>
    <a href="tel:031-212-2929" class="btn-tel">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14v2.92z"/>
      </svg>
      031-212-2929 전화 상담
    </a>
  </div>

  <div class="divider"></div>

  <div class="quick-section">

    <div class="quick-grid">
      <a href="/" class="quick-link"><span class="quick-icon">🏠</span>동수원 소개</a>
      <a href="/" class="quick-link"><span class="quick-icon">🏥</span>시설 안내</a>
      <a href="/" class="quick-link"><span class="quick-icon">💊</span>서비스 안내</a>
      <a href="/" class="quick-link"><span class="quick-icon">📋</span>입소 절차</a>

</html>
